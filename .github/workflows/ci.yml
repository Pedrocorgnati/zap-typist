name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint e TypeCheck (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependencias de dev
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check src tests

      - name: Formato (ruff format --check)
        run: ruff format --check src tests

      - name: TypeCheck (mypy)
        run: mypy src

  deps-unused:
    name: Auditoria de Deps (deptry)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias de dev
        run: pip install -e ".[dev]"

      - name: deptry (deps nao usadas/faltantes)
        run: deptry src tests

  test:
    name: Testes (pytest + coverage 80%) — py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint-and-type
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependencias de dev
        run: pip install -e ".[dev]"

      # QT_QPA_PLATFORM=offscreen permite que testes marcados com @pytest.mark.qt
      # sejam executados sem um display server (X11) real no runner do GitHub.
      - name: Executar testes
        run: pytest -v --cov-report=xml
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Upload coverage report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always() && matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml

  security-sca:
    name: Auditoria de Seguranca (SCA)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar pip-audit
        run: pip install pip-audit

      # Audita apenas o requirements.txt do projeto (escopo correto),
      # evitando ruido de pacotes globais do sistema (ver DEPENDENCY-AUDIT.md).
      - name: pip-audit (escopo: requirements.txt)
        run: pip-audit -r requirements.txt --desc --progress-spinner off

  secrets-scan:
    name: Scan de Secrets (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@b6b00bbe5460109a21287b6612bd68a86bf060c2 # v3.88.3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
